# Transformer Health Index AI

Python app jo sirf `DGA_HI_Smooth_Dataset_with_Reasons.xlsx` ke data se Transformer Health Index predict karta hai.

Current behavior: workbook ke `Thresholds_and_Reasons` tab se gas thresholds train hote hain. Recommendation reasons `capping_with_reasons.xlsx` se load hote hain, so issue value ke saath condition aur reason show hota hai. Agar koi gas poor max cross kare to final HI `0`; otherwise target source `Smooth_HI * 100`. App-level operating rule bhi apply hota hai: `WTI > 95`, `OTI > 90`, ya `BDV < 40` par final HI `0`.

## Files

- `health_rules.py` - gas threshold table, rule scores, feature builder.
- `train_model.py` - `Training_Data` sheet aur `Thresholds_and_Reasons` tab load karta hai, dynamic reason table ke saath NumPy neural model train karta hai.
- `app.py` - dynamic web index page aur prediction API.
- `model/health_index_model.npz` - training ke baad generated model.
- `model/metadata.json` - training metrics.
- `outputs/DGA_HI_Training_Set_Augmented.csv` - new dataset rows plus derived gas scores/conditions/threshold features, reason columns, Label_Rule features, `HI_before_label_rule`, and `HI_training_target`.

## Run

```powershell
cd transformer_health_index_ai
python train_model.py
python app.py
```

Open:

```text
http://127.0.0.1:8000
```

## Deploy

The app is deployment-ready with project-local data files.

- `data/DGA_HI_Smooth_Dataset_with_Reasons.xlsx`
- `data/capping_with_reasons.xlsx`
- `requirements.txt`
- `Procfile`
- `render.yaml`

For Render/Railway-style hosting, use:

```text
Build command: pip install -r requirements.txt
Start command: python app.py
```

The app reads the hosting platform `PORT` environment variable automatically.

## Model Inputs

The model uses DGA gas values plus gas rule features. BDV/OTI/WTI model features nahi hain; app unhe hard operating-limit checks ke liye use karta hai.

- H2, CO, CO2, Methane, Acetylene, Ethylene, Ethane
- App operating inputs: BDV, OTI(MAX), WTI(MAX)
- Per-gas threshold scores, gas average score, minimum score, critical count, poor-or-worse count
- Label_Rule-derived features: any gas critical, acceptable, deteriorated, binary HI rule
- Per-gas threshold table columns: healthy max, moderate max, poor max, critical limit, critical ratio, critical excess, critical flag
- Training target: `HI_training_target = 0 if any gas value > Poor Max from Thresholds_and_Reasons tab, otherwise Smooth_HI * 100`
